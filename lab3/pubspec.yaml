name: lab3
description: "Advanced Calculator Flutter Project"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # STATE MANAGEMENT
  provider: ^6.1.1

  # LOCAL STORAGE (history, settings)
  shared_preferences: ^2.2.2

  # MATH PARSER (quan trọng nhất cho calculator)
  math_expressions: ^2.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
